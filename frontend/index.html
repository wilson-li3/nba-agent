<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Don't Lie — NBA Intelligence</title>
<meta name="description" content="Ask anything about the NBA — stats, news, and betting analysis answered from real data.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/theme.css">
<script>document.documentElement.dataset.theme = localStorage.getItem('bdl_theme') || '';</script>
<script src="https://cdn.jsdelivr.net/npm/marked@11/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2/dist/iconify-icon.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* palette tokens live in theme.css */
}

html,body{
  height:100%;
  font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  font-size:14px;
}
button{font-family:inherit;}
iconify-icon{display:inline-block;vertical-align:-0.125em;}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  max-width:820px;
  margin:0 auto;
  width:100%;
}

/* ─── HEADER ─── */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:56px;
  padding:0 24px;
  border-bottom:1px solid var(--border);
}
.brand{
  display:flex;align-items:center;gap:8px;
  font-weight:650;font-size:0.95rem;letter-spacing:-0.01em;
  color:var(--ink);text-decoration:none;
  cursor:pointer;background:none;border:none;
}
.brand iconify-icon{font-size:1.25rem;color:var(--accent);}
.betting-link{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--ink-2);
  font-size:0.82rem;
  font-weight:500;
  text-decoration:none;
  transition:border-color 0.15s, color 0.15s;
  white-space:nowrap;
}
.betting-link:hover{border-color:var(--border-strong);color:var(--ink);}

/* ─── SCORES TICKER ─── */
.scores-bar{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 24px;
  border-bottom:1px solid var(--border);
  font-size:0.8rem;
  color:var(--ink-3);
  overflow-x:auto;
  scrollbar-width:none;
  flex-shrink:0;
}
.scores-bar::-webkit-scrollbar{display:none;}
.scores-label{
  font-weight:600;color:var(--ink-2);white-space:nowrap;flex-shrink:0;
}

.game-chip{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:4px 10px;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:0.76rem;
  font-weight:500;
  color:var(--ink);
  white-space:nowrap;
  background:var(--surface);
  cursor:pointer;
  transition:border-color 0.15s, background 0.15s;
  font-variant-numeric:tabular-nums;
}
.game-chip:hover{border-color:var(--border-strong);background:var(--surface-2);}
.game-chip.live{border-color:var(--live-edge);}
.game-chip.live:hover{border-color:var(--green);}
.game-chip small{color:var(--ink-3);font-size:0.72rem;}
.live-dot{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--green);
  animation:livePulse 1.5s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes livePulse{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}
.team-logo{
  width:16px;height:16px;
  object-fit:contain;
  vertical-align:middle;
}

/* ─── LANDING ─── */
.landing{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
  padding:0 24px 8vh;
  transition:opacity 0.3s ease;
  position:relative;
  overflow:hidden;
}
.landing.hidden{display:none;}
.landing > *{position:relative;}

/* Backdrop: a quiet accent glow + court arcs, behind everything */
.landing-backdrop{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(ellipse 640px 420px at 50% 38%, var(--landing-glow), transparent 70%);
}
.landing-backdrop svg{
  position:absolute;
  left:50%;
  bottom:-12%;
  transform:translateX(-50%);
  width:min(880px, 130vw);
  opacity:0.4;
}

.landing-title{
  font-size:1.6rem;
  font-weight:650;
  letter-spacing:-0.02em;
  text-wrap:balance;
  text-align:center;
}
.landing-sub{
  margin-top:8px;
  font-size:0.9rem;
  color:var(--ink-2);
  text-align:center;
  text-wrap:balance;
}
.landing .input-area{
  margin-top:28px;
  width:100%;
  max-width:560px;
  padding:0;
}

/* Suggestions — an empty state that teaches the surface */
.suggestions{
  margin-top:16px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  max-width:560px;
}
.suggestion-chip{
  padding:6px 12px;
  border:1px solid var(--border);
  border-radius:99px;
  background:var(--surface);
  color:var(--ink-2);
  font-size:0.8rem;
  cursor:pointer;
  transition:border-color 0.15s, color 0.15s;
}
.suggestion-chip:hover{border-color:var(--border-strong);color:var(--ink);}

/* Headlines — quiet, landing only */
.headlines{
  margin-top:40px;
  max-width:560px;
  width:100%;
  font-size:0.8rem;
  line-height:1.7;
  color:var(--ink-3);
}
.headlines-label{
  font-weight:600;color:var(--ink-2);
  display:flex;align-items:center;gap:6px;
  margin-bottom:6px;
}
.headlines a{
  color:var(--ink-2);
  text-decoration:none;
}
.headlines a:hover{color:var(--accent-ink);text-decoration:underline;}
.headlines-sep{color:var(--border-strong);margin:0 4px;}

/* ─── CHAT VIEW ─── */
.chat-view{
  flex:1;
  display:none;
  flex-direction:column;
  overflow:hidden;
}
.chat-view.active{display:flex;}

.messages{
  flex:1;
  overflow-y:auto;
  padding:20px 24px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.message{
  max-width:78%;
  padding:10px 14px;
  border-radius:14px;
  font-size:0.88rem;
  line-height:1.6;
  animation:msgIn 0.25s cubic-bezier(0.25,1,0.5,1);
}
@keyframes msgIn{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

.message.user{
  align-self:flex-end;
  background:var(--accent);
  color:var(--accent-contrast);
  border-bottom-right-radius:4px;
}

.message.assistant{
  align-self:flex-start;
  background:var(--surface);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
  max-width:88%;
}

.message .category-badge{
  display:block;
  font-size:0.68rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--accent-ink);
  margin-bottom:6px;
}

.message .sql-details{margin-top:10px;}
.message .sql-details summary{
  font-size:0.76rem;color:var(--ink-3);font-weight:500;cursor:pointer;
  display:inline-flex;align-items:center;gap:4px;
}
.message .sql-details summary:hover{color:var(--ink-2);}
.message .sql-block{
  margin-top:8px;
  padding:10px 12px;
  background:var(--surface-2);
  border-radius:8px;
  font-family:'IBM Plex Mono','SF Mono',monospace;
  font-size:0.74rem;
  color:var(--ink-2);
  overflow-x:auto;
  white-space:pre;
}

.message .sources{margin-top:10px;font-size:0.76rem;color:var(--ink-3);}
.message .sources a{color:var(--accent-ink);text-decoration:none;}
.message .sources a:hover{text-decoration:underline;}

/* ─── TYPING INDICATOR ─── */
.loading{
  align-self:flex-start;
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 14px;
  animation:msgIn 0.25s ease;
}
.typing-dots{display:flex;gap:4px;}
.typing-dots span{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--ink-3);
  animation:typingDot 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.15s;}
.typing-dots span:nth-child(3){animation-delay:0.3s;}
@keyframes typingDot{
  0%,60%,100%{opacity:0.25;transform:translateY(0)}
  30%{opacity:1;transform:translateY(-3px)}
}
.loading-text{
  font-size:0.78rem;
  color:var(--ink-3);
}

/* ─── INPUT ─── */
.input-area{padding:12px 24px 20px;}

.input-bubble{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--surface);
  border:1px solid var(--border-strong);
  border-radius:12px;
  padding:6px 6px 6px 14px;
  transition:border-color 0.15s, box-shadow 0.15s;
}
.input-bubble:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--focus-ring);
}

.input-bubble input{
  flex:1;
  border:none;
  outline:none;
  font-size:0.9rem;
  font-family:inherit;
  color:var(--ink);
  background:transparent;
  min-width:0;
}
.input-bubble input::placeholder{color:var(--ink-3);}

.input-bubble button{
  flex-shrink:0;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:34px;height:34px;
  background:var(--accent);
  color:var(--accent-contrast);
  border:none;
  border-radius:9px;
  font-size:1rem;
  cursor:pointer;
  transition:background 0.15s, opacity 0.15s;
}
.input-bubble button:hover{background:var(--accent-ink);}
.input-bubble button:disabled{opacity:0.35;cursor:not-allowed;}
.input-bubble button:disabled:hover{background:var(--accent);}

/* ─── MARKDOWN IN ASSISTANT MESSAGES ─── */
.message.assistant h1,.message.assistant h2,.message.assistant h3,
.message.assistant h4,.message.assistant h5,.message.assistant h6{
  margin:12px 0 6px;
  font-weight:650;
  line-height:1.3;
  letter-spacing:-0.01em;
}
.message.assistant h1{font-size:1.05rem;}
.message.assistant h2{font-size:1rem;}
.message.assistant h3{font-size:0.92rem;}

.message.assistant p{margin:6px 0;}

.message.assistant ul,.message.assistant ol{
  margin:6px 0;
  padding-left:20px;
}
.message.assistant li{margin:3px 0;}

.message.assistant table{
  width:100%;
  border-collapse:collapse;
  margin:10px 0;
  font-size:0.8rem;
  font-variant-numeric:tabular-nums;
}
.message.assistant thead tr{
  border-bottom:1.5px solid var(--border-strong);
}
.message.assistant th{
  font-weight:600;
  color:var(--ink-2);
  text-align:left;
  padding:6px 10px;
}
.message.assistant td{
  padding:6px 10px;
  border-bottom:1px solid var(--border);
  text-align:left;
}

.message.assistant pre{
  margin:8px 0;
  padding:10px 12px;
  background:var(--surface-2);
  border-radius:8px;
  font-family:'IBM Plex Mono','SF Mono',monospace;
  font-size:0.74rem;
  color:var(--ink-2);
  overflow-x:auto;
}
.message.assistant code{
  font-family:'IBM Plex Mono','SF Mono',monospace;
  font-size:0.82em;
  background:var(--surface-2);
  padding:1px 5px;
  border-radius:4px;
}
.message.assistant pre code{background:none;padding:0;}

.message.assistant hr{
  border:none;
  border-top:1px solid var(--border);
  margin:12px 0;
}

.message.assistant blockquote{
  border-left:2px solid var(--border-strong);
  padding-left:12px;
  margin:8px 0;
  color:var(--ink-2);
}

@media(max-width:640px){
  .app{max-width:100%;}
  .message{max-width:92%;}
  .header,.scores-bar,.messages,.input-area{padding-left:16px;padding-right:16px;}
  .landing{padding-left:16px;padding-right:16px;}
  .landing-title{font-size:1.35rem;}
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}
}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <button class="brand" onclick="resetToLanding()" title="New chat">
      <iconify-icon icon="tabler:ball-basketball"></iconify-icon>
      Ball Don't Lie
    </button>
    <a href="/static/betting.html" class="betting-link">
      <iconify-icon icon="tabler:chart-dots-3"></iconify-icon>
      Betting Picks
    </a>
  </header>

  <!-- Scores ticker -->
  <div class="scores-bar" id="scoresBar">
    <span id="scoresContent">No games today</span>
  </div>

  <!-- LANDING -->
  <div class="landing" id="landing">
    <div class="landing-backdrop" aria-hidden="true">
      <!-- court key + three-point arc, drawn as hairlines -->
      <svg viewBox="0 0 800 340" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 340 C40 120 760 120 760 340" stroke="var(--court-line)" stroke-width="1.5"/>
        <rect x="290" y="200" width="220" height="140" stroke="var(--court-line)" stroke-width="1.5"/>
        <circle cx="400" cy="200" r="58" stroke="var(--court-line)" stroke-width="1.5"/>
        <circle cx="400" cy="316" r="7" stroke="var(--court-line)" stroke-width="1.5"/>
      </svg>
    </div>
    <h1 class="landing-title">Ask anything about the NBA</h1>
    <p class="landing-sub">Stats, news, and betting analysis — answered from real data.</p>

    <div class="input-area">
      <form class="input-bubble" id="chatForm" autocomplete="off">
        <input type="text" id="questionInput" placeholder="Ask about stats, news, or props…" required>
        <button type="submit" id="sendBtn" aria-label="Send">
          <iconify-icon icon="tabler:arrow-up"></iconify-icon>
        </button>
      </form>
    </div>

    <div class="suggestions">
      <button class="suggestion-chip" onclick="askSuggestion(this)">Should I take Tatum over 25.5 points?</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">Who leads the league in assists?</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">Best props tonight</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">Latest Lakers news</button>
    </div>

    <div class="headlines" id="headlinesBlock" hidden>
      <div class="headlines-label">
        <iconify-icon icon="tabler:news"></iconify-icon>
        Headlines
      </div>
      <div id="headlinesItems"></div>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div class="chat-view" id="chatView">
    <div class="messages" id="messages"></div>
    <div class="input-area" id="chatInputArea"></div>
  </div>

</div>

<script>
marked.use({ breaks: true, gfm: true });

const form = document.getElementById('chatForm');
const input = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
const messagesEl = document.getElementById('messages');
const landingEl = document.getElementById('landing');
const chatViewEl = document.getElementById('chatView');
const chatInputArea = document.getElementById('chatInputArea');
const headlinesBlock = document.getElementById('headlinesBlock');
const headlinesItems = document.getElementById('headlinesItems');
const scoresContent = document.getElementById('scoresContent');

let chatActive = false;
let conversationHistory = [];

function resetToLanding() {
  chatActive = false;
  conversationHistory = [];
  messagesEl.innerHTML = '';
  landingEl.classList.remove('hidden');
  chatViewEl.classList.remove('active');
  // Move form back to landing
  const landingInputArea = landingEl.querySelector('.input-area');
  if (landingInputArea && form.parentElement !== landingInputArea) {
    landingInputArea.appendChild(form);
  }
  input.value = '';
  input.focus();
}

function askSuggestion(el) {
  input.value = el.textContent;
  form.requestSubmit();
}

// ─── Headlines ───
async function fetchHeadlines() {
  try {
    const res = await fetch('/headlines');
    const data = await res.json();
    if (data.headlines && data.headlines.length > 0) {
      headlinesBlock.hidden = false;
      headlinesItems.innerHTML = data.headlines.slice(0, 4).map(h =>
        h.url
          ? `<a href="${escapeHtml(h.url)}" target="_blank" rel="noopener">${escapeHtml(h.title)}</a>`
          : escapeHtml(h.title)
      ).join('<span class="headlines-sep">·</span>');
    }
  } catch (e) { /* stay hidden */ }
}

function teamLogo(teamId) {
  if (!teamId) return '';
  return `<img src="https://cdn.nba.com/logos/nba/${teamId}/primary/L/logo.svg" class="team-logo" alt="" loading="lazy">`;
}

// ─── Scores ───
async function fetchScores() {
  try {
    const res = await fetch('/scores');
    const data = await res.json();
    if (data.games && data.games.length > 0) {
      const label = data.label ? `<span class="scores-label">${escapeHtml(data.label)}</span>` : '';
      const chips = data.games.map(g => {
        const hasScore = g.home_pts != null && g.away_pts != null;
        const statusText = g.game_status_text || '';
        const isLive = statusText.match(/^\d/) && !statusText.match(/final/i);
        const liveDot = isLive ? '<span class="live-dot"></span>' : '';
        const gameData = JSON.stringify({
          home_team_abbr: g.home_team_abbr,
          away_team_abbr: g.away_team_abbr,
          home_team_id: g.home_team_id,
          away_team_id: g.away_team_id,
          game_status_text: g.game_status_text
        }).replace(/'/g, '&#39;');
        const liveClass = isLive ? ' live' : '';
        if (hasScore) {
          return `<span class="game-chip${liveClass}" onclick='startGamePreview(${gameData})'>${liveDot}${teamLogo(g.away_team_id)}${escapeHtml(g.away_team_abbr)} ${g.away_pts} – ${g.home_pts} ${teamLogo(g.home_team_id)}${escapeHtml(g.home_team_abbr)} <small>${escapeHtml(statusText)}</small></span>`;
        } else {
          return `<span class="game-chip${liveClass}" onclick='startGamePreview(${gameData})'>${teamLogo(g.away_team_id)}${escapeHtml(g.away_team_abbr)} @ ${teamLogo(g.home_team_id)}${escapeHtml(g.home_team_abbr)} <small>${escapeHtml(statusText)}</small></span>`;
        }
      }).join(' ');
      scoresContent.innerHTML = label + chips;
    }
  } catch (e) { /* keep placeholder */ }
}

// ─── Init ───
fetchHeadlines();
fetchScores();
setInterval(fetchScores, 60000);

// "/" focuses the question input from anywhere
document.addEventListener('keydown', (e) => {
  const tag = (document.activeElement?.tagName || '').toLowerCase();
  if (e.key === '/' && tag !== 'input' && tag !== 'textarea') {
    e.preventDefault();
    input.focus();
  }
});

function switchToChat() {
  if (chatActive) return;
  chatActive = true;
  landingEl.classList.add('hidden');
  chatViewEl.classList.add('active');
  chatInputArea.appendChild(form);
  input.focus();
}

function createLoader(text) {
  const loader = document.createElement('div');
  loader.className = 'loading';
  loader.innerHTML = `
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span class="loading-text">${text}</span>
  `;
  return loader;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;

  switchToChat();

  addMessage(question, 'user');
  const historySnapshot = conversationHistory.slice(-10);
  conversationHistory.push({ role: 'user', content: question });
  input.value = '';
  sendBtn.disabled = true;

  const loader = createLoader('Thinking…');
  messagesEl.appendChild(loader);
  scrollToBottom();

  try {
    const body = { question, message_history: historySnapshot };

    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();
    loader.remove();
    addAssistantMessage(data);
    conversationHistory.push({ role: 'assistant', content: data.answer || '' });
  } catch (err) {
    loader.remove();
    addAssistantMessage({
      answer: 'Something went wrong. Make sure the backend is running.',
      category: null
    });
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
});

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollToBottom();
}

function addAssistantMessage(data) {
  const div = document.createElement('div');
  div.className = 'message assistant';
  let html = '';

  if (data.category) {
    const labels = {
      stats:'Stats', news:'News', mixed:'Mixed',
      betting:'Betting', off_topic:'Off Topic', error:'Error',
      game_preview:'Game Preview'
    };
    html += `<span class="category-badge">${labels[data.category] || data.category}</span>`;
  }

  if (data.answer) {
    html += `<div>${formatAnswer(data.answer)}</div>`;
  }

  if (data.sql) {
    html += `<details class="sql-details">
      <summary><iconify-icon icon="tabler:code"></iconify-icon> Show SQL</summary>
      <div class="sql-block">${escapeHtml(data.sql)}</div>
    </details>`;
  }

  if (data.sources && data.sources.length > 0) {
    html += '<div class="sources"><strong>Sources:</strong> ';
    html += data.sources.map(s =>
      s.url ? `<a href="${escapeHtml(s.url)}" target="_blank" rel="noopener">${escapeHtml(s.title||s.source)}</a>` : escapeHtml(s.title||s.source)
    ).join(' · ');
    html += '</div>';
  }

  div.innerHTML = html;
  messagesEl.appendChild(div);
  scrollToBottom();
}

function formatAnswer(text) {
  return marked.parse(text);
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function startGamePreview(game) {
  switchToChat();

  const userMsg = `${game.away_team_abbr} @ ${game.home_team_abbr} — Game Preview`;
  addMessage(userMsg, 'user');
  conversationHistory.push({ role: 'user', content: userMsg });

  sendBtn.disabled = true;

  const loader = createLoader('Building preview…');
  messagesEl.appendChild(loader);
  scrollToBottom();

  try {
    const body = {
      home_team_abbr: game.home_team_abbr,
      away_team_abbr: game.away_team_abbr,
      home_team_id: game.home_team_id,
      away_team_id: game.away_team_id,
    };

    const res = await fetch('/game-preview', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();
    loader.remove();
    addAssistantMessage(data);
    conversationHistory.push({ role: 'assistant', content: data.answer || '' });
  } catch (err) {
    loader.remove();
    addAssistantMessage({
      answer: 'Something went wrong generating the game preview. Please try again.',
      category: 'error'
    });
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}
</script>
