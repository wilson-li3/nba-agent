<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betting Picks | Ball Don't Lie</title>
<meta name="description" content="Calibrated player-prop probabilities from a backtested prediction model — today's picks, factor analysis, and parlay builder.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/theme.css">
<script>document.documentElement.dataset.theme = localStorage.getItem('bdl_theme') || '';</script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2/dist/iconify-icon.min.js"></script>
<script src="/static/theme.js"></script>
<style>
:root{
  /* palette tokens live in theme.css */
  --z-sticky:10; --z-tooltip:40;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  font-size:14px;
}
button{font-family:inherit;}
iconify-icon{display:inline-block;vertical-align:-0.125em;}

/* ── Header ── */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  height:56px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.header-left{display:flex;align-items:baseline;gap:10px;}
.brand{
  display:flex;align-items:center;gap:8px;
  font-weight:650;font-size:0.95rem;letter-spacing:-0.01em;
  color:var(--ink);text-decoration:none;
}
.brand iconify-icon{font-size:1.25rem;color:var(--accent);}
.header-context{font-size:0.85rem;color:var(--ink-3);}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:0.82rem;font-weight:500;
  color:var(--ink-2);text-decoration:none;
  padding:6px 12px;border:1px solid var(--border);border-radius:8px;
  background:var(--surface);
  transition:border-color 0.15s, color 0.15s;
}
.back-link:hover{border-color:var(--border-strong);color:var(--ink);}
.header-right{display:flex;align-items:center;gap:8px;}

/* ── Main layout ── */
.content{
  display:grid;
  grid-template-columns:320px minmax(0,1fr) 300px;
  height:calc(100vh - 57px);
}
.content > *{min-width:0;}

/* ── Picks panel ── */
.picks-panel{
  border-right:1px solid var(--border);
  overflow-y:auto;
  background:var(--surface);
}
.picks-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 20px 12px;
  position:sticky;top:0;
  background:var(--surface);
  z-index:var(--z-sticky);
}
.picks-title{font-size:0.85rem;font-weight:600;}
.picks-count{font-size:0.75rem;color:var(--ink-3);font-variant-numeric:tabular-nums;}

.picks-list{padding:0 12px 16px;}

.pick-card{
  border:1px solid transparent;
  border-radius:10px;
  padding:12px;
  margin-bottom:2px;
  cursor:pointer;
  transition:background 0.15s, border-color 0.15s, transform 0.15s;
}
.pick-card:hover{background:var(--surface-2);transform:translateY(-1px);}
.picks-list.animate-in .pick-card{
  animation:cardIn 0.4s cubic-bezier(0.25,1,0.5,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.pick-card.active{
  background:var(--accent-soft);
  border-color:var(--accent-edge);
}

.pick-top{display:flex;align-items:center;gap:10px;}
.pick-team-logo{width:24px;height:24px;object-fit:contain;flex-shrink:0;}
.pick-player{font-weight:600;font-size:0.86rem;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pick-matchup{font-size:0.75rem;color:var(--ink-3);white-space:nowrap;}

.pick-add-btn{
  width:26px;height:26px;border-radius:7px;
  border:1px solid var(--border);background:var(--surface);
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  font-size:0.9rem;color:var(--ink-3);
  transition:border-color 0.15s, color 0.15s, background 0.15s;
  flex-shrink:0;
}
.pick-add-btn:hover{border-color:var(--accent);color:var(--accent-ink);}
.pick-add-btn:active{transform:scale(0.9);}
.pick-add-btn.in-slip{border-color:var(--accent);background:var(--accent);color:var(--accent-contrast);}

.pick-middle{display:flex;align-items:center;gap:10px;margin-top:8px;}
.prop-label{
  font-size:0.78rem;font-weight:600;color:var(--ink);
  font-variant-numeric:tabular-nums;white-space:nowrap;
}
.b2b-badge{
  display:inline-flex;align-items:center;gap:3px;
  color:var(--warn-ink);
  font-size:0.7rem;font-weight:500;
}

.confidence-bar{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:8px;min-width:0;}
.pick-ring{flex-shrink:0;}
.pick-ring .ring-fg{
  transition:stroke-dasharray 0.3s cubic-bezier(0.25,1,0.5,1);
}
.confidence-pct{
  font-size:0.82rem;font-weight:600;color:var(--ink);
  text-align:right;font-variant-numeric:tabular-nums;
}

.pick-reasoning{
  font-size:0.76rem;color:var(--ink-2);line-height:1.5;
  margin-top:8px;
  display:none;
}
.pick-card.active .pick-reasoning{display:block;}

/* ── Graph panel ── */
.graph-panel{
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}
.graph-header{
  padding:18px 24px 0;
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:16px;
}
.graph-title{font-size:0.85rem;font-weight:600;}
.graph-player-label{
  font-size:0.82rem;color:var(--ink-2);font-weight:500;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.graph-container{
  flex:1;
  position:relative;
  min-height:0;
  overflow:hidden;
}
#graphSvg{width:100%;height:100%;display:block;position:relative;}

.node-label{
  font-family:'IBM Plex Sans',sans-serif;
  text-anchor:middle;
  pointer-events:none;
  font-weight:600;
}
.node-value{
  font-family:'IBM Plex Sans',sans-serif;
  text-anchor:middle;
  pointer-events:none;
  font-variant-numeric:tabular-nums;
}
.edge-path{fill:none;pointer-events:none;}

/* Tooltip */
.graph-tooltip{
  position:absolute;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  font-size:0.78rem;
  box-shadow:0 8px 24px oklch(0 0 0 / 0.45);
  pointer-events:none;
  opacity:0;
  transition:opacity 0.15s;
  max-width:250px;
  z-index:var(--z-tooltip);
}
.graph-tooltip.visible{opacity:1;}
.tooltip-label{font-weight:600;margin-bottom:2px;}
.tooltip-meta{color:var(--ink-2);font-variant-numeric:tabular-nums;}
.tooltip-detail{color:var(--ink-2);font-size:0.74rem;margin-top:6px;line-height:1.45;}

/* ── Weights panel ── */
.sliders-panel{
  padding:14px 24px 16px;
  border-top:1px solid var(--border);
  background:var(--surface);
}
.sliders-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.sliders-title{font-size:0.78rem;font-weight:600;color:var(--ink-2);}
.sliders-reset{
  display:inline-flex;align-items:center;gap:4px;
  font-size:0.74rem;
  color:var(--ink-3);
  cursor:pointer;
  border:none;background:none;font-weight:500;
  padding:3px 8px;border-radius:6px;
  transition:color 0.15s, background 0.15s;
}
.sliders-reset:hover{color:var(--ink);background:var(--surface-2);}
.sliders-grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:10px 20px;
}
.slider-item{display:flex;flex-direction:column;gap:4px;}
.slider-top{display:flex;align-items:center;gap:6px;}
.slider-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.slider-name{font-size:0.72rem;color:var(--ink-2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slider-val{font-size:0.72rem;font-weight:600;color:var(--ink);min-width:20px;text-align:right;font-variant-numeric:tabular-nums;}
.slider-input{
  -webkit-appearance:none;
  appearance:none;
  width:100%;
  height:3px;
  border-radius:2px;
  background:var(--surface-2);
  outline:none;
  cursor:pointer;
}
.slider-input::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:12px;height:12px;border-radius:50%;
  background:var(--ink);cursor:pointer;
  border:2px solid var(--surface);
  box-shadow:0 0 0 1px var(--border-strong);
  transition:background 0.15s;
}
.slider-input:focus-visible::-webkit-slider-thumb{background:var(--accent);}
.slider-input::-moz-range-thumb{
  width:12px;height:12px;border-radius:50%;
  background:var(--ink);cursor:pointer;
  border:2px solid var(--surface);
  box-shadow:0 0 0 1px var(--border-strong);
}

/* ── Loading skeleton ── */
.skeleton-panel{padding:18px 20px;}
.skeleton{
  border-radius:8px;
  background:linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s ease-in-out infinite;
}
@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
.skeleton-card{height:64px;margin-bottom:8px;}
.skeleton-line{height:12px;margin-bottom:10px;}
.skeleton-circle{border-radius:50%;}
.skeleton-graph{
  display:flex;align-items:center;justify-content:center;height:100%;
}

/* ── Empty state ── */
.empty-state{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  text-align:center;
  padding:40px;
  color:var(--ink-2);
  gap:6px;
}
.empty-state iconify-icon{font-size:1.6rem;color:var(--ink-3);margin-bottom:6px;}
.empty-state h3{font-size:0.95rem;font-weight:600;color:var(--ink);}
.empty-state p{font-size:0.82rem;max-width:300px;line-height:1.5;}
.empty-state button{
  margin-top:12px;padding:7px 16px;
  border:1px solid var(--border);border-radius:8px;
  background:var(--surface);cursor:pointer;
  font-size:0.82rem;font-weight:500;color:var(--ink);
  transition:border-color 0.15s;
}
.empty-state button:hover{border-color:var(--border-strong);}

/* ── Bet Slip panel ── */
.betslip-panel{
  border-left:1px solid var(--border);
  overflow-y:auto;
  background:var(--surface);
  padding:18px 20px;
  display:flex;
  flex-direction:column;
}
.betslip-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}
.betslip-title-row{display:flex;align-items:center;gap:8px;}
.betslip-title{font-size:0.85rem;font-weight:600;}
.betslip-badge{
  font-size:0.72rem;font-weight:600;
  background:var(--ink);color:var(--surface);
  padding:1px 7px;border-radius:99px;
  min-width:20px;text-align:center;
  font-variant-numeric:tabular-nums;
}
.betslip-clear{
  font-size:0.74rem;color:var(--ink-3);
  cursor:pointer;border:none;background:none;font-weight:500;
  padding:3px 8px;border-radius:6px;
  transition:color 0.15s, background 0.15s;
}
.betslip-clear:hover{color:var(--ink);background:var(--surface-2);}

.betslip-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;color:var(--ink-3);font-size:0.8rem;
  padding:24px;line-height:1.55;gap:8px;
}
.betslip-empty iconify-icon{font-size:1.4rem;}

.slip-items{flex:1;overflow-y:auto;margin-bottom:12px;}
.slip-card{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:10px;margin-bottom:6px;
  background:var(--surface);
  transition:border-color 0.15s;
  animation:cardIn 0.3s cubic-bezier(0.25,1,0.5,1);
}
.slip-card:hover{border-color:var(--border-strong);}
.slip-info{flex:1;min-width:0;}
.slip-player{font-weight:600;font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slip-prop{font-size:0.74rem;color:var(--ink-2);margin-top:2px;font-variant-numeric:tabular-nums;}
.slip-conf{font-size:0.72rem;color:var(--ink-3);margin-top:1px;font-variant-numeric:tabular-nums;}
.slip-remove{
  width:24px;height:24px;border-radius:6px;
  border:none;background:none;
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  font-size:0.85rem;color:var(--ink-3);
  transition:color 0.15s, background 0.15s;flex-shrink:0;
}
.slip-remove:hover{background:var(--danger-soft);color:var(--danger);}

/* Parlay summary */
.parlay-summary{
  border-top:1px solid var(--border);
  padding-top:12px;margin-top:4px;
}
.parlay-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:3px 0;font-size:0.8rem;
}
.parlay-label{color:var(--ink-2);}
.parlay-value{font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;}
.parlay-value.highlight{color:var(--accent-ink);}
.parlay-odds-box{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-top:8px;padding:10px 12px;
  background:var(--accent-soft);
  border:1px solid var(--accent-edge);
  border-radius:10px;
}
.parlay-odds-box .odds-label{font-size:0.76rem;color:var(--ink-2);}
.parlay-odds-box .odds-value{
  font-size:1.15rem;font-weight:700;color:var(--accent-ink);
  font-variant-numeric:tabular-nums;letter-spacing:-0.01em;
}
.parlay-warning{
  display:flex;gap:6px;align-items:flex-start;
  font-size:0.72rem;color:var(--warn-ink);
  background:var(--warn-bg);padding:8px 10px;
  border-radius:8px;margin-top:10px;line-height:1.45;
}
.parlay-warning iconify-icon{flex-shrink:0;margin-top:1px;}

/* Bankroll calculator */
.bankroll-section{
  border-top:1px solid var(--border);
  padding-top:12px;margin-top:12px;
}
.bankroll-title{font-size:0.78rem;font-weight:600;margin-bottom:10px;color:var(--ink-2);}
.bankroll-input-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.bankroll-input-row label{font-size:0.76rem;color:var(--ink-2);min-width:56px;}
.bankroll-input{
  flex:1;padding:7px 10px;
  border:1px solid var(--border);border-radius:8px;
  font-family:inherit;font-size:0.82rem;
  outline:none;transition:border-color 0.15s, box-shadow 0.15s;
  background:var(--surface);
  color:var(--ink);
  font-variant-numeric:tabular-nums;
}
.bankroll-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-ring);}
.bankroll-results{
  background:var(--surface-2);border-radius:10px;
  padding:10px 12px;
}
.bankroll-result-row{
  display:flex;justify-content:space-between;
  padding:3px 0;font-size:0.8rem;
}
.bankroll-result-label{color:var(--ink-2);}
.bankroll-result-value{font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;}

/* ── Responsive ── */
@media(max-width:900px){
  .content{
    grid-template-columns:minmax(0,1fr);
    grid-template-rows:auto auto auto;
    height:auto;
  }
  .picks-panel{border-right:none;border-bottom:1px solid var(--border);max-height:45vh;}
  .graph-panel{min-height:60vh;}
  .betslip-panel{border-left:none;border-top:1px solid var(--border);}
  .header{padding:0 16px;}
  .header-context{display:none;}
  .sliders-grid{grid-template-columns:repeat(2, 1fr);}
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}
}
</style>
</head>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <a href="/" class="brand">
      <iconify-icon icon="tabler:ball-basketball"></iconify-icon>
      Ball Don't Lie
    </a>
    <span class="header-context">Betting picks · calibrated model probabilities</span>
  </div>
  <div class="header-right">
    <a href="/" class="back-link">
      <iconify-icon icon="tabler:arrow-left"></iconify-icon>
      Chat
    </a>
    <span id="themeMount"></span>
  </div>
</header>

<!-- Content -->
<div class="content" id="content">
  <div class="picks-panel skeleton-panel">
    <div class="skeleton skeleton-line" style="width:40%"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>
  <div class="graph-panel">
    <div class="skeleton-graph">
      <div class="skeleton skeleton-circle" style="width:120px;height:120px"></div>
    </div>
  </div>
  <div class="betslip-panel skeleton-panel">
    <div class="skeleton skeleton-line" style="width:35%"></div>
    <div class="skeleton skeleton-card" style="height:48px"></div>
  </div>
</div>

<!-- Tooltip -->
<div class="graph-tooltip" id="tooltip"></div>

<script>
const CATEGORY_COLORS = {
  center: 'var(--accent)',              // accent — the one strong color
  historical: 'var(--cat-historical)',
  trend: 'var(--cat-trend)',
  matchup: 'var(--cat-matchup)',
  situational: 'var(--cat-situational)',
  derived: 'var(--cat-derived)',
  advanced: 'var(--cat-advanced)',
  meta: 'var(--cat-meta)',
};

const content = document.getElementById('content');
const tooltip = document.getElementById('tooltip');
let currentPicks = [];
let selectedIndex = -1;
let simulation = null;
let rawApiData = null;
let betSlip = []; // array of pick indices
let bankroll = parseFloat(localStorage.getItem('bdl_bankroll')) || 1000;
const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// Adjustable weights (start with server defaults, user can tweak)
// These drive the what-if slider view; the server confidence itself is a
// calibrated probability from the prediction engine.
let userWeights = {
  recent_form: 0.25,
  hit_rate_l20: 0.20,
  volatility: 0.15,
  minutes_trend: 0.12,
  opp_defense: 0.10,
  rest: 0.10,
  home_away: 0.08,
};

const DEFAULT_WEIGHTS = {...userWeights};

const FACTOR_ORDER = ['recent_form','hit_rate_l20','volatility','minutes_trend','opp_defense','rest','home_away'];
const FACTOR_LABELS = {
  recent_form:'Recent Form', hit_rate_l20:'Hit Rate L20', volatility:'Volatility',
  minutes_trend:'Minutes Trend', opp_defense:'Opp Defense', rest:'Rest',
  home_away:'Home/Away',
};
const FACTOR_CATS = {
  recent_form:'trend', hit_rate_l20:'historical', volatility:'derived',
  minutes_trend:'advanced', opp_defense:'matchup', rest:'situational',
  home_away:'situational',
};

const PROP_LABELS = {'pts':'PTS','reb':'REB','ast':'AST','fg3m':'3PM','pra':'PRA'};

function teamLogo(abbr) {
  const MAP = {
    ATL:1610612737,BOS:1610612738,BKN:1610612751,CHA:1610612766,
    CHI:1610612741,CLE:1610612739,DAL:1610612742,DEN:1610612743,
    DET:1610612765,GSW:1610612744,HOU:1610612745,IND:1610612754,
    LAC:1610612746,LAL:1610612747,MEM:1610612763,MIA:1610612748,
    MIL:1610612749,MIN:1610612750,NOP:1610612740,NYK:1610612752,
    OKC:1610612760,ORL:1610612753,PHI:1610612755,PHX:1610612756,
    POR:1610612757,SAC:1610612758,SAS:1610612759,TOR:1610612761,
    UTA:1610612762,WAS:1610612764,
  };
  const id = MAP[abbr];
  return id ? `https://cdn.nba.com/logos/nba/${id}/primary/L/logo.svg` : '';
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── Recompute confidence using user weights ──
function recomputeConfidence(pick) {
  let total = 0, wSum = 0;
  for (const key of FACTOR_ORDER) {
    const score = pick.factors[key]?.score || 0.5;
    const w = userWeights[key];
    total += score * w;
    wSum += w;
  }
  // Weighted average — always 0–1
  return wSum > 0 ? Math.min(1, total / wSum) : 0;
}

function recomputeAllPicks() {
  for (const p of currentPicks) {
    p._userConfidence = recomputeConfidence(p);
  }
  // Don't re-sort — preserves selectedIndex and betSlip indices
}

// ── Fetch picks ──
async function loadPicks() {
  try {
    const res = await fetch('/betting/picks');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    rawApiData = await res.json();
    currentPicks = rawApiData.picks || [];
    // Initialize user confidence
    for (const p of currentPicks) p._userConfidence = p.confidence;
    renderApp(rawApiData);
  } catch (err) {
    console.error('Failed to load picks:', err);
    content.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <iconify-icon icon="tabler:plug-connected-x"></iconify-icon>
        <h3>Couldn't load picks</h3>
        <p>The picks service didn't respond. Make sure the server is running, then try again.</p>
        <button onclick="location.reload()">Retry</button>
      </div>`;
  }
}

  content.innerHTML = `

// Small SVG donut — same visual language as the graph's score rings
function confidenceRing(pct) {
  const r = 9, C = 2 * Math.PI * r;
  const filled = (pct / 100) * C;
  return `
    <svg class="pick-ring" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <circle cx="12" cy="12" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="3"/>
      <circle class="ring-fg" cx="12" cy="12" r="${r}" fill="none" stroke="var(--accent)" stroke-width="3"
        stroke-linecap="round" stroke-dasharray="${filled.toFixed(1)} ${C.toFixed(1)}" transform="rotate(-90 12 12)"/>
    </svg>`;
}

// ── Render picks list ──
let picksAnimatedOnce = false;
function renderPicksList() {
  const list = document.getElementById('picksList');
  if (!list) return;
  list.innerHTML = currentPicks.map((pick, i) => {
    const conf = Math.round((pick._userConfidence ?? pick.confidence) * 100);
    const inSlip = betSlip.includes(i);
    return `
    <div class="pick-card ${i === selectedIndex ? 'active' : ''}" data-index="${i}" onclick="selectPick(${i})" style="animation-delay:${i * 35}ms">
      <div class="pick-top">
        <img class="pick-team-logo" src="${teamLogo(pick.team)}" alt="${escapeHtml(pick.team || '')}" onerror="this.style.display='none'">
        <span class="pick-player">${escapeHtml(pick.player_name)}</span>
        <span class="pick-matchup">${pick.opponent ? (pick.location === 'home' ? 'vs ' : '@ ') + escapeHtml(pick.opponent) : ''}</span>
        <button class="pick-add-btn ${inSlip ? 'in-slip' : ''}" onclick="event.stopPropagation();toggleSlip(${i})"
          title="${inSlip ? 'Remove from slip' : 'Add to slip'}" aria-label="${inSlip ? 'Remove from slip' : 'Add to slip'}">
          <iconify-icon icon="${inSlip ? 'tabler:check' : 'tabler:plus'}"></iconify-icon>
        </button>
      </div>
      <div class="pick-middle">
        <span class="prop-label">Over ${pick.line} ${PROP_LABELS[pick.prop_type] || pick.prop_type}</span>
        ${pick.is_b2b ? '<span class="b2b-badge" title="Back-to-back game"><iconify-icon icon="tabler:zzz"></iconify-icon>B2B</span>' : ''}
        <div class="confidence-bar">
          <span class="confidence-pct">${conf}%</span>
          ${confidenceRing(conf)}
        </div>
      </div>
      <div class="pick-reasoning">${escapeHtml(pick.reasoning)}</div>
    </div>`;
  }).join('');

  if (!picksAnimatedOnce) {

// ── Render weight sliders ──
function renderSliders() {
  const grid = document.getElementById('slidersGrid');
  if (!grid) return;

  grid.innerHTML = FACTOR_ORDER.map(key => {
    const w = userWeights[key];
    const color = CATEGORY_COLORS[FACTOR_CATS[key]] || '#ccc';
    return `
      <div class="slider-item">
        <div class="slider-top">
          <span class="slider-dot" style="background:${color}"></span>
          <span class="slider-name">${FACTOR_LABELS[key]}</span>
          <span class="slider-val" id="sw_${key}">${Math.round(w * 100)}</span>
        </div>
        <input type="range" class="slider-input" min="0" max="50" value="${Math.round(w * 100)}"
          data-key="${key}" oninput="onSliderChange(this)" aria-label="${FACTOR_LABELS[key]} weight">
      </div>`;
  }).join('');
}

function onSliderChange(el) {
  const key = el.dataset.key;
  userWeights[key] = parseInt(el.value, 10) / 100;
  const valEl = document.getElementById('sw_' + key);
  if (valEl) valEl.textContent = el.value;

  recomputeAllPicks();
  renderPicksList();
  // Update graph in-place instead of full re-render (avoids freeze)
  if (selectedIndex >= 0 && currentPicks[selectedIndex]) {
    const pick = currentPicks[selectedIndex];
    const label = document.getElementById('graphPlayerLabel');
    if (label) label.textContent = `${pick.player_name} — Over ${pick.line} ${PROP_LABELS[pick.prop_type] || pick.prop_type}`;
    renderGraph(pick);
  }
  updateBetSlipCalc();
}

function resetWeights() {
  userWeights = {...DEFAULT_WEIGHTS};
  recomputeAllPicks();
  renderPicksList();
  renderSliders();
  if (selectedIndex >= 0 && currentPicks[selectedIndex]) {
    renderGraph(currentPicks[selectedIndex]);
  }
  updateBetSlipCalc();
}

// ── Select a pick ──
function selectPick(index) {
  selectedIndex = index;
  const pick = currentPicks[index];
  if (!pick) return;

  renderPicksList();
  const label = document.getElementById('graphPlayerLabel');
  if (label) label.textContent = `${pick.player_name} — Over ${pick.line} ${PROP_LABELS[pick.prop_type] || pick.prop_type}`;
  renderSliders();
  renderGraph(pick, {animate: true});
}

// ── Graph rendering ──
// The layout is pre-computed off-screen (simulation.tick × 300), so the
// graph appears settled — then nodes fade in with a light stagger.
function renderGraph(pick, opts = {}) {
  const animate = !!opts.animate && !REDUCED_MOTION;
  const container = document.getElementById('graphContainer');
  const svg = d3.select('#graphSvg');
  svg.selectAll('*').remove();

  if (simulation) { simulation.stop(); simulation = null; }

  const width = container.clientWidth;
  const height = container.clientHeight;
  svg.attr('viewBox', `0 0 ${width} ${height}`);

  const graphData = pick.graph;
  if (!graphData) return;

  const nodes = graphData.nodes.map(n => ({...n}));

  // Update confidence node with user-computed value
  const confNode = nodes.find(n => n.id === 'confidence');
  if (confNode) confNode.value = pick._userConfidence ?? pick.confidence;

  // Update real factor node weights from sliders
  for (const n of nodes) {
    if (userWeights[n.id] !== undefined) {
      n.weight = userWeights[n.id];
    }
  }

  const edges = graphData.edges.map(e => ({...e}));
  for (const e of edges) {
    const srcId = typeof e.source === 'string' ? e.source : e.source.id;
    if (userWeights[srcId] !== undefined && (typeof e.target === 'string' ? e.target : e.target.id) === 'confidence') {
      e.weight = userWeights[srcId];
    }
  }

  const nodeIds = new Set(nodes.map(n => n.id));
  const validEdges = edges.filter(e => {
    const s = typeof e.source === 'string' ? e.source : e.source.id;
    const t = typeof e.target === 'string' ? e.target : e.target.id;
    return nodeIds.has(s) && nodeIds.has(t);
  });

  const CENTER_R = 54;
  const radiusScale = d3.scaleSqrt().domain([0, 1]).range([26, 42]);
  const nodeR = d => d.id === 'confidence' ? CENTER_R : radiusScale(d.weight);
  const edgeWidth = d3.scaleLinear().domain([0, 0.6]).range([1, 2.5]).clamp(true);

  // ── Pre-compute layout: run the simulation to convergence off-screen ──
  const area = width * height;
  const scaleFactor = Math.sqrt(area / (800 * 600));
  const baseDist = 150 * scaleFactor;

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(validEdges).id(d => d.id).distance(d => {
      const s = d.source.id || d.source;
      const t = d.target.id || d.target;
      if (s === 'confidence' || t === 'confidence') return baseDist * 1.35;
      return baseDist * (0.65 + (1 - d.weight) * 0.5);
    }).strength(d => 0.12 + d.weight * 0.2))
    .force('charge', d3.forceManyBody().strength(-560 * scaleFactor))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => nodeR(d) + 18))
    .stop();

  // Pin the confidence node to the center for a stable composition
  if (confNode) { confNode.fx = width / 2; confNode.fy = height / 2; }
  simulation.tick(300);

  const clampNode = d => {
    const r = nodeR(d) + 10;
    d.x = Math.max(r, Math.min(width - r, d.x));
    d.y = Math.max(r, Math.min(height - r, d.y));
  };
  nodes.forEach(clampNode);

  // ── Curved edges ──
  const edgePath = d => {
    const sx = d.source.x, sy = d.source.y, tx = d.target.x, ty = d.target.y;
    const dx = tx - sx, dy = ty - sy;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    // Perpendicular offset for a gentle arc
    const off = dist * 0.12;
    const mx = (sx + tx) / 2 - (dy / dist) * off;
    const my = (sy + ty) / 2 + (dx / dist) * off;
    return `M${sx},${sy} Q${mx},${my} ${tx},${ty}`;
  };

  // Backdrop: a soft glow centered on the probability node (the holographic
  // court behind the svg provides the rest of the atmosphere)
  const defs = svg.append('defs');
  const glow = defs.append('radialGradient').attr('id', 'centerGlow');
  glow.append('stop').attr('offset', '0%').style('stop-color', 'var(--graph-glow)');
  glow.append('stop').attr('offset', '100%').style('stop-color', 'transparent');

  svg.append('circle')
    .attr('cx', width / 2).attr('cy', height / 2)
    .attr('r', CENTER_R * 3.4)
    .attr('fill', 'url(#centerGlow)')
    .attr('pointer-events', 'none');

  const linkG = svg.append('g');
  const link = linkG.selectAll('path')
    .data(validEdges)
    .join('path')
    .attr('class', 'edge-path')
    .attr('d', edgePath)
    .style('stroke', 'var(--graph-edge)')
    .attr('stroke-width', d => edgeWidth(d.weight))
    .attr('stroke-opacity', animate ? 0 : d => 0.07 + d.weight * 0.22)
    .attr('stroke-linecap', 'round');

  // ── Nodes ──
  const nodeG = svg.append('g');
  const node = nodeG.selectAll('g')
    .data(nodes)
    .join('g')
    .attr('cursor', 'pointer')
    .attr('transform', d => `translate(${d.x},${d.y})`);

  const isCenter = d => d.id === 'confidence';

  // Base circle: white with hairline stroke; center node is the accent moment
  node.append('circle')
    .attr('class', 'node-base')
    .attr('r', nodeR)
    .style('fill', d => isCenter(d) ? CATEGORY_COLORS.center : 'var(--surface)')
    .style('stroke', d => isCenter(d) ? 'none' : 'var(--graph-node-stroke)')
    .attr('stroke-width', 1);

  // Score ring: an arc around the node showing the factor score
  const ringArc = (d, v) => d3.arc()
    .innerRadius(nodeR(d) + 2.5)
    .outerRadius(nodeR(d) + 5)
    .startAngle(0)
    .cornerRadius(2)
    .endAngle(v * 2 * Math.PI)();

  node.filter(d => !isCenter(d))
    .append('path')
    .attr('class', 'node-ring')
    .style('fill', d => CATEGORY_COLORS[d.category] || 'var(--cat-situational)')
    .attr('fill-opacity', 0.85)
    .attr('d', d => ringArc(d, animate ? 0.0001 : d.value));

  // Faint full track behind the ring
  node.filter(d => !isCenter(d))
    .insert('path', '.node-ring')
    .style('fill', 'var(--graph-track)')
    .attr('d', d => ringArc(d, 1));

  // Labels
  node.append('text')
    .attr('class', 'node-label')
    .attr('dy', d => isCenter(d) ? '-0.35em' : '-0.15em')
    .style('fill', d => isCenter(d) ? 'var(--accent-contrast)' : 'var(--graph-label)')
    .style('font-size', d => isCenter(d) ? '13px' : Math.max(9, nodeR(d) * 0.26) + 'px')
    .text(d => d.label);

  node.append('text')
    .attr('class', 'node-value')
    .attr('dy', '1.05em')
    .style('fill', d => isCenter(d) ? 'var(--accent-contrast)' : 'var(--graph-value)')
    .style('font-size', d => isCenter(d) ? '15px' : Math.max(9, nodeR(d) * 0.26) + 'px')
    .style('font-weight', d => isCenter(d) ? 700 : 500)
    .text(d => Math.round(d.value * 100) + '%');

  // ── Entrance: settled layout fades in — no chaotic re-flow ──
  if (animate) {
    node.attr('opacity', 0)
      .transition()
      .duration(340)
      .delay((d, i) => isCenter(d) ? 0 : 60 + i * 28)
      .ease(d3.easeCubicOut)
      .attr('opacity', 1);

    node.selectAll('.node-ring')
      .transition()
      .duration(560)
      .delay((d, i) => 180 + i * 28)
      .ease(d3.easeCubicOut)
      .attrTween('d', function(d) {
        const interp = d3.interpolate(0.0001, d.value);
        return t => ringArc(d, interp(t));
      });

    link.transition()
      .duration(420)
      .delay(240)
      .ease(d3.easeCubicOut)
      .attr('stroke-opacity', d => 0.07 + d.weight * 0.22);
  } else {
    node.attr('opacity', 1);
  }

  // ── Drag (gentle: simulation resumes at low energy) ──
  const drag = d3.drag()
    .on('start', (event, d) => {
      simulation.alphaTarget(0.12).restart();
      d.fx = d.x; d.fy = d.y;
    })
    .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
    .on('end', (event, d) => {
      simulation.alphaTarget(0);
      if (!isCenter(d)) { d.fx = null; d.fy = null; }
    });

  simulation.on('tick', () => {
    nodes.forEach(clampNode);
    link.attr('d', edgePath);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  node.call(drag);

  // ── Hover: tooltip + connection highlighting ──
  node.on('mouseenter', (event, d) => {
    const rect = container.getBoundingClientRect();
    const wPct = d.weight !== undefined ? Math.round(d.weight * 100) + '%' : '–';
    tooltip.innerHTML = `
      <div class="tooltip-label">${escapeHtml(d.label)}</div>
      <div class="tooltip-meta">Score ${Math.round(d.value * 100)}% · Weight ${wPct}</div>
      <div class="tooltip-detail">${escapeHtml(d.detail)}</div>
    `;
    tooltip.classList.add('visible');
    tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
    tooltip.style.top = (event.clientY - rect.top - 12) + 'px';

    link
      .style('stroke', l => {
        const ls = l.source.id, lt = l.target.id;
        return (ls === d.id || lt === d.id) ? (CATEGORY_COLORS[d.category] || CATEGORY_COLORS.center) : 'var(--graph-edge)';
      })
      .attr('stroke-opacity', l => {
        const ls = l.source.id, lt = l.target.id;
        return (ls === d.id || lt === d.id) ? 0.6 : 0.04;
      });

    const connectedIds = new Set([d.id]);
    validEdges.forEach(e => {
      const s = e.source.id || e.source, t = e.target.id || e.target;
      if (s === d.id) connectedIds.add(t);
      if (t === d.id) connectedIds.add(s);
    });
    node.attr('opacity', n => connectedIds.has(n.id) ? 1 : 0.25);
  })
  .on('mousemove', (event) => {
    const rect = container.getBoundingClientRect();
    tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
    tooltip.style.top = (event.clientY - rect.top - 12) + 'px';
  })
  .on('mouseleave', () => {
    tooltip.classList.remove('visible');
    link
      .style('stroke', 'var(--graph-edge)')
      .attr('stroke-opacity', d => 0.07 + d.weight * 0.22);
    node.attr('opacity', 1);
  });
}

// ── Bet Slip logic ──
function toggleSlip(index) {
  const idx = betSlip.indexOf(index);
  if (idx >= 0) betSlip.splice(idx, 1);
  else betSlip.push(index);
  renderPicksList();
  renderBetSlip();
}

function removeFromSlip(index) {
  betSlip = betSlip.filter(i => i !== index);
  renderPicksList();
  renderBetSlip();
}

function clearSlip() {
  betSlip = [];
  renderPicksList();
  renderBetSlip();
}

function getParlayConfidence() {
  if (betSlip.length === 0) return 0;
  let combined = 1;
  for (const i of betSlip) {
    const p = currentPicks[i];
    combined *= (p._userConfidence ?? p.confidence);
  }
  return combined;
}

function confidenceToAmericanOdds(prob) {
  if (prob <= 0) return '+9999';
  if (prob >= 1) return '-9999';
  if (prob > 0.5) return '-' + Math.round((prob / (1 - prob)) * 100);
  return '+' + Math.round(((1 - prob) / prob) * 100);
}

function confidenceToDecimalOdds(prob) {
  return prob > 0 ? 1 / prob : 999;
}

function calcWager(bankroll, prob) {
  if (bankroll <= 0 || prob <= 0) return 0;
  // Confidence-weighted percentage: scale from 1% (50% conf) to 5% (90%+ conf)
  // Below 50% confidence, use flat 1%
  const pct = prob >= 0.9 ? 0.05
    : prob >= 0.5 ? 0.01 + (prob - 0.5) * (0.04 / 0.4)
    : 0.01;
  return Math.round(bankroll * pct * 100) / 100;
}

function onBankrollChange(val) {
  bankroll = parseFloat(val) || 0;
  try { localStorage.setItem('bdl_bankroll', String(bankroll)); } catch (e) { /* private mode */ }
  updateBetSlipCalc();
}

// Update just the calculation results without replacing the whole panel
function updateBetSlipCalc() {
  const resultsEl = document.getElementById('bankrollResults');
  if (!resultsEl || betSlip.length === 0) return;

  const isSingle = betSlip.length === 1;
  const singlePick = isSingle ? currentPicks[betSlip[0]] : null;
  const singleConf = singlePick ? (singlePick._userConfidence ?? singlePick.confidence) : 0;
  const parlayConf = getParlayConfidence();

  const displayConf = isSingle ? singleConf : parlayConf;
  const displayDec = confidenceToDecimalOdds(displayConf);
  const displayWager = calcWager(bankroll, displayConf);
  const displayToWin = Math.round(displayWager * (displayDec - 1) * 100) / 100;

  resultsEl.innerHTML = `
    <div class="bankroll-result-row">
      <span class="bankroll-result-label">Suggested Wager</span>
      <span class="bankroll-result-value">$${displayWager.toFixed(2)}</span>
    </div>
    <div class="bankroll-result-row">
      <span class="bankroll-result-label">To Win</span>
      <span class="bankroll-result-value">$${displayToWin.toFixed(2)}</span>
    </div>
    <div class="bankroll-result-row">
      <span class="bankroll-result-label">Total Payout</span>
      <span class="bankroll-result-value">$${(displayWager + displayToWin).toFixed(2)}</span>
    </div>`;
}

function checkCorrelationWarning() {
  // Warn if multiple picks from same team
  const teams = betSlip.map(i => currentPicks[i]?.team).filter(Boolean);
  const seen = new Set();
  for (const t of teams) {
    if (seen.has(t)) return `Multiple picks from ${t} — correlated outcomes may reduce true probability.`;
    seen.add(t);
  }
  return null;
}

function renderBetSlip() {
  const panel = document.getElementById('betslipPanel');
  if (!panel) return;

  if (betSlip.length === 0) {
    panel.innerHTML = `
      <div class="betslip-header">
        <div class="betslip-title-row">
          <span class="betslip-title">Bet Slip</span>
          <span class="betslip-badge">0</span>
        </div>
      </div>
      <div class="betslip-empty">
        <iconify-icon icon="tabler:receipt"></iconify-icon>
        <span>Add picks with <iconify-icon icon="tabler:plus"></iconify-icon> to build a straight bet or parlay.</span>
      </div>`;
    return;
  }

  const parlayConf = getParlayConfidence();
  const warning = checkCorrelationWarning();

  // Single bet mode
  const isSingle = betSlip.length === 1;
  const singlePick = isSingle ? currentPicks[betSlip[0]] : null;
  const singleConf = singlePick ? (singlePick._userConfidence ?? singlePick.confidence) : 0;

  const displayConf = isSingle ? singleConf : parlayConf;
  const displayOdds = confidenceToAmericanOdds(displayConf);
  const displayDec = confidenceToDecimalOdds(displayConf);
  const displayWager = calcWager(bankroll, displayConf);
  const displayToWin = Math.round(displayWager * (displayDec - 1) * 100) / 100;

  panel.innerHTML = `
    <div class="betslip-header">
      <div class="betslip-title-row">
        <span class="betslip-title">Bet Slip</span>
        <span class="betslip-badge">${betSlip.length}</span>
      </div>
      <button class="betslip-clear" onclick="clearSlip()">Clear all</button>
    </div>
    <div class="slip-items">
      ${betSlip.map(i => {
        const p = currentPicks[i];
        const conf = Math.round((p._userConfidence ?? p.confidence) * 100);
        const propLabel = PROP_LABELS[p.prop_type] || p.prop_type;
        return `
          <div class="slip-card">
            <div class="slip-info">
              <div class="slip-player">${escapeHtml(p.player_name)}</div>
              <div class="slip-prop">Over ${p.line} ${propLabel}</div>
              <div class="slip-conf">${conf}% probability</div>
            </div>
            <button class="slip-remove" onclick="removeFromSlip(${i})" title="Remove" aria-label="Remove from slip">
              <iconify-icon icon="tabler:x"></iconify-icon>
            </button>
          </div>`;
      }).join('')}
    </div>
    <div class="parlay-summary">
      <div class="parlay-row">
        <span class="parlay-label">${isSingle ? 'Type' : 'Legs'}</span>
        <span class="parlay-value">${isSingle ? 'Straight' : betSlip.length + '-Leg Parlay'}</span>
      </div>
      <div class="parlay-row">
        <span class="parlay-label">${isSingle ? 'Probability' : 'Combined Probability'}</span>
        <span class="parlay-value">${(displayConf * 100).toFixed(1)}%</span>
      </div>
      <div class="parlay-odds-box">
        <span class="odds-label">Implied Odds</span>
        <span class="odds-value">${displayOdds}</span>
      </div>
      ${warning ? `<div class="parlay-warning"><iconify-icon icon="tabler:alert-triangle"></iconify-icon><span>${warning}</span></div>` : ''}
    </div>
    <div class="bankroll-section">
      <div class="bankroll-title">Bet Size Calculator</div>
      <div class="bankroll-input-row">
        <label for="bankrollInput">Bankroll</label>
        <input type="number" class="bankroll-input" id="bankrollInput" value="${bankroll}" min="0" step="100"
          oninput="onBankrollChange(this.value)" placeholder="Enter bankroll...">
      </div>
      <div class="bankroll-results" id="bankrollResults">
        <div class="bankroll-result-row">
          <span class="bankroll-result-label">Suggested Wager</span>
          <span class="bankroll-result-value">$${displayWager.toFixed(2)}</span>
        </div>
        <div class="bankroll-result-row">
          <span class="bankroll-result-label">To Win</span>
          <span class="bankroll-result-value">$${displayToWin.toFixed(2)}</span>
        </div>
        <div class="bankroll-result-row">
          <span class="bankroll-result-label">Total Payout</span>
          <span class="bankroll-result-value">$${(displayWager + displayToWin).toFixed(2)}</span>
        </div>
      </div>
    </div>`;
}

// ── Keyboard navigation: ↑/↓ move between picks, Enter toggles slip ──
document.addEventListener('keydown', (e) => {
  if (!currentPicks.length) return;
  const tag = (document.activeElement?.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    const dir = e.key === 'ArrowDown' ? 1 : -1;
    const next = Math.max(0, Math.min(currentPicks.length - 1, (selectedIndex < 0 ? 0 : selectedIndex + dir)));
    if (next !== selectedIndex) {
      selectPick(next);
      document.querySelector(`.pick-card[data-index="${next}"]`)?.scrollIntoView({block: 'nearest'});
    }
  } else if (e.key === 'Enter' && selectedIndex >= 0) {
    e.preventDefault();
    toggleSlip(selectedIndex);
  }
});

// ── Resize handler ──
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (selectedIndex >= 0 && currentPicks[selectedIndex]) {
      renderGraph(currentPicks[selectedIndex]);
    }
  }, 200);
});

// ── Init ──
initThemePicker(document.getElementById('themeMount'));
initCourtLayers();
loadPicks();
</script>
</body>
</html>
